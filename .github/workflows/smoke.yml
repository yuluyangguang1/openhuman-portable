name: Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shell syntax (bash -n)
        run: |
          for f in OpenHumanPortable.sh OpenHumanPortable.command lib/preflight.sh lib/maintain.sh; do
            if [ -f "$f" ]; then
              echo "  checking $f ..."
              bash -n "$f"
            else
              echo "  skipping $f (not found)"
            fi
          done

      - name: Python syntax
        run: |
          python3 -c "
          import py_compile, sys, pathlib
          errors = []
          for f in pathlib.Path('lib').glob('*.py'):
              try:
                  py_compile.compile(str(f), doraise=True)
              except py_compile.PyCompileError as e:
                  errors.append(str(e))
          if errors:
              print('\\n'.join(errors))
              sys.exit(1)
          print(f'  all .py files OK')
          "

      - name: YAML validity
        run: |
          python3 -c "
          import yaml, sys, pathlib
          for f in pathlib.Path('.github/workflows').glob('*.yml'):
              try:
                  yaml.safe_load(f.read_text())
                  print(f'  {f.name} OK')
              except Exception as e:
                  print(f'  {f.name} FAILED: {e}')
                  sys.exit(1)
          " || echo "  (pyyaml not installed, skipping)"

      - name: HTML structural sanity
        run: |
          python3 -c "
          import pathlib
          for f in pathlib.Path('.').glob('lib/*.html'):
              t = f.read_text(errors='replace')
              if '<html' in t.lower() and '</html>' in t.lower():
                  print(f'  {f.name} OK')
              else:
                  print(f'  {f.name} MISSING <html> or </html>')
                  exit(1)
          "

  runtime-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Boot config server and test endpoints
        run: |
          set -e
          # Create minimal data dir
          mkdir -p data/.openhuman data/.cc-switch

          # Start config server in background (if exists)
          if [ -f lib/config_server.py ]; then
            python3 lib/config_server.py &
            SERVER_PID=$!
            sleep 2

            # Test heartbeat
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:17600/api/heartbeat 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "  [ok] /api/heartbeat"
            else
              echo "  [WARN] /api/heartbeat returned $STATUS (server may not have /api/heartbeat)"
            fi

            kill $SERVER_PID 2>/dev/null || true
          else
            echo "  [SKIP] No config_server.py found"
          fi

      - name: Preflight script syntax check
        run: |
          if [ -f lib/preflight.sh ]; then
            bash -n lib/preflight.sh
            echo "  [ok] lib/preflight.sh syntax OK"
          fi

      - name: Maintain script syntax check
        run: |
          if [ -f lib/maintain.sh ]; then
            bash -n lib/maintain.sh
            echo "  [ok] lib/maintain.sh syntax OK"
          fi

      - name: VERSION file check
        run: |
          if [ -f VERSION ]; then
            ver=$(cat VERSION | tr -d '[:space:]')
            echo "  VERSION: $ver"
            if [[ "$ver" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
              echo "  [ok] VERSION format valid"
            else
              echo "  [WARN] VERSION format unexpected: $ver"
            fi
          else
            echo "  [FAIL] VERSION file missing"
            exit 1
          fi
