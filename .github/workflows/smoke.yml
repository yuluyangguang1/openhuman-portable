name: Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shell syntax check
        run: |
          bash -n OpenHumanPortable.sh
          bash -n OpenHumanPortable.command
          bash -n setup.sh
          echo "  Shell syntax: OK"

      - name: HTML validation
        run: |
          python3 -c "
          import pathlib
          for f in pathlib.Path('lib').glob('*.html'):
              html = f.read_text()
              assert '<html' in html.lower(), f'{f}: missing <html>'
              assert '</html>' in html.lower(), f'{f}: missing </html>'
              print(f'  {f}: OK')
          "

      - name: YAML validation
        run: |
          python3 -c "
          import yaml, pathlib
          for f in pathlib.Path('.github/workflows').glob('*.yml'):
              yaml.safe_load(f.read_text())
              print(f'  {f}: OK')
          "

      - name: Verify structure
        run: |
          test -f VERSION
          test -f OpenHumanPortable.bat
          test -f OpenHumanPortable.command
          test -f OpenHumanPortable.sh
          test -f setup.sh
          test -f lib/first-launch.html
          test -d installers
          echo "  Structure: OK"
