name: Build OpenHuman Portable

on:
  workflow_dispatch:
    inputs:
      openhuman_version:
        description: 'OpenHuman release tag (e.g. v0.57.18). Empty = latest release.'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve OpenHuman version
        id: oh_ver
        run: |
          if [ -n "${{ github.event.inputs.openhuman_version }}" ]; then
            echo "tag=${{ github.event.inputs.openhuman_version }}" >> $GITHUB_OUTPUT
          else
            tag=$(curl -sL https://api.github.com/repos/tinyhumansai/openhuman/releases/latest | jq -r '.tag_name')
            echo "tag=$tag" >> $GITHUB_OUTPUT
          fi

      - name: Download OpenHuman binaries
        env:
          OH_TAG: ${{ steps.oh_ver.outputs.tag }}
        run: |
          set -e
          mkdir -p bin/macos-arm64 bin/macos-x64 bin/linux-x64 bin/windows-x64
          VER_NUM="${OH_TAG#v}"
          BASE="https://github.com/tinyhumansai/openhuman/releases/download/${OH_TAG}"

          echo "  Downloading OpenHuman ${OH_TAG} ..."

          # --- macOS arm64: .app.tar.gz ---
          echo "  -> macOS arm64"
          curl -fsSL -o /tmp/oh-mac-arm64.tar.gz \
            "${BASE}/OpenHuman_${VER_NUM}_aarch64-apple-darwin.app.tar.gz" || true
          if [ -f /tmp/oh-mac-arm64.tar.gz ] && [ -s /tmp/oh-mac-arm64.tar.gz ]; then
            tar -xzf /tmp/oh-mac-arm64.tar.gz -C bin/macos-arm64
          fi

          # --- macOS x64: .app.tar.gz ---
          echo "  -> macOS x64"
          curl -fsSL -o /tmp/oh-mac-x64.tar.gz \
            "${BASE}/OpenHuman_${VER_NUM}_x86_64-apple-darwin.app.tar.gz" || true
          if [ -f /tmp/oh-mac-x64.tar.gz ] && [ -s /tmp/oh-mac-x64.tar.gz ]; then
            tar -xzf /tmp/oh-mac-x64.tar.gz -C bin/macos-x64
          fi

          # --- Windows x64: .exe (NSIS installer) ---
          echo "  -> Windows x64"
          curl -fsSL -o bin/windows-x64/OpenHuman-setup.exe \
            "${BASE}/OpenHuman_${VER_NUM}_x64-setup.exe" || true

          # --- Linux x64: .AppImage ---
          echo "  -> Linux x64"
          curl -fsSL -o bin/linux-x64/OpenHuman.AppImage \
            "${BASE}/OpenHuman_${VER_NUM}_amd64.AppImage" || true
          chmod +x bin/linux-x64/OpenHuman.AppImage 2>/dev/null || true

          echo "  Download complete."
          find bin -maxdepth 3 -type f \( -name 'OpenHuman*' -o -name 'openhuman*' \) -exec ls -lh {} \;

      - name: Set version
        run: echo "${{ steps.oh_ver.outputs.tag }}" > VERSION

      - name: Build per-platform packages
        run: |
          VER="${{ steps.oh_ver.outputs.tag }}"
          DIST="dist"
          mkdir -p "$DIST"

          build_package() {
            local plat="$1"
            local pkg="OpenHumanPortable-${plat}-${VER}"
            local dist_dir="${DIST}/${pkg}"

            mkdir -p "${dist_dir}/bin/${plat}" "${dist_dir}/lib" "${dist_dir}/data"

            # Copy launcher scripts + tools + lib
            cp OpenHumanPortable.bat OpenHumanPortable.command OpenHumanPortable.sh "${dist_dir}/" 2>/dev/null || true
            cp setup.sh "${dist_dir}/"
            cp VERSION "${dist_dir}/"
            cp -r tools "${dist_dir}/" 2>/dev/null || true
            cp -r lib "${dist_dir}/"

            # Copy installers to dist root (not inside installers/ subdir)
            cp -r installers/OpenHumanPortable.app "${dist_dir}/" 2>/dev/null || true
            cp installers/OpenHumanPortable.vbs "${dist_dir}/" 2>/dev/null || true
            cp installers/OpenHumanPortable.desktop "${dist_dir}/" 2>/dev/null || true

            # Copy platform binaries
            cp -r "bin/${plat}/"* "${dist_dir}/bin/${plat}/" 2>/dev/null || true

            # Set permissions
            chmod +x "${dist_dir}/OpenHumanPortable.command" "${dist_dir}/OpenHumanPortable.sh" 2>/dev/null || true
            chmod +x "${dist_dir}/bin/${plat}/"* 2>/dev/null || true

            # Create zip
            (cd "$DIST" && zip -r "${pkg}.zip" "${pkg}")
            rm -rf "${dist_dir}"
          }

          for plat in macos-arm64 macos-x64 linux-x64 windows-x64; do
            if [ -d "bin/$plat" ] && [ "$(ls -A bin/$plat 2>/dev/null)" ]; then
              echo "  Packaging $plat ..."
              build_package "$plat"
            else
              echo "  Skipping $plat (no binaries)"
            fi
          done

          # All-platforms package
          echo "  Packaging all-platforms ..."
          pkg="OpenHumanPortable-all-platforms-${VER}"
          dist_dir="${DIST}/${pkg}"
          mkdir -p "${dist_dir}/bin" "${dist_dir}/lib" "${dist_dir}/data"
          cp OpenHumanPortable.bat OpenHumanPortable.command OpenHumanPortable.sh "${dist_dir}/"
          cp setup.sh VERSION "${dist_dir}/"
          cp -r tools lib "${dist_dir}/" 2>/dev/null || true
          cp -r installers/OpenHumanPortable.app "${dist_dir}/" 2>/dev/null || true
          cp installers/OpenHumanPortable.vbs "${dist_dir}/" 2>/dev/null || true
          cp installers/OpenHumanPortable.desktop "${dist_dir}/" 2>/dev/null || true
          cp -r bin "${dist_dir}/"
          find "${dist_dir}" -name '*.sh' -o -name '*.command' | xargs chmod +x 2>/dev/null || true
          find "${dist_dir}/bin" -type f | xargs chmod +x 2>/dev/null || true
          (cd "$DIST" && zip -r "${pkg}.zip" "${pkg}")
          rm -rf "${dist_dir}"

          echo "  Done:"
          ls -lh "$DIST"/*.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: dist/*.zip

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*.zip
